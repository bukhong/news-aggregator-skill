name: Daily News Briefing

on:
  schedule:
    # 08:00 Beijing time = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:        # allow manual trigger from GitHub UI
    inputs:
      profile:
        description: "Briefing profile"
        required: false
        default: "tech"
        type: choice
        options: [tech, ai, finance, social, general]

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily briefing
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_HOST:      ${{ secrets.SMTP_HOST }}
          SMTP_PORT:      ${{ secrets.SMTP_PORT }}
          PYTHONIOENCODING: utf-8
        run: |
          PROFILE="${{ github.event.inputs.profile || 'tech' }}"
          python scripts/run_daily.py --profile "$PROFILE"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
